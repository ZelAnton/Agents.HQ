[package]
name = "hq-spawn"
version = "0.1.0"
edition = "2021"
description = "Оркестратор .hq: bounded-concurrency спавнер исполнителей поверх processkit (kill-on-drop дерева, per-job таймаут). Фаза P3."

[[bin]]
name = "hq-spawn"
path = "src/main.rs"

[dependencies]
# Догфуд: ограничение параллелизма + таймаут + kill-on-drop всего дерева процессов (Windows Job Object).
processkit = "0.9"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
